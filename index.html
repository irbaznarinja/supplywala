<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>SupplyWala — We'll Be Right Back</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Poppins',-apple-system,sans-serif;
    background:linear-gradient(135deg,#0A1F3C 0%,#0D2D4A 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:48px 36px;
    max-width:480px;
    width:100%;
    text-align:center;
    backdrop-filter:blur(10px);
  }
  .logo{
    width:64px;height:64px;
    background:#22C55E;
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:36px;font-weight:800;color:#052e16;
    margin:0 auto 20px;
  }
  .brand{
    color:#fff;font-size:20px;font-weight:700;margin-bottom:4px;
  }
  .tagline{
    color:#22C55E;font-size:12px;font-weight:600;letter-spacing:0.05em;
    text-transform:uppercase;margin-bottom:32px;
  }
  .icon-wrap{
    width:72px;height:72px;
    background:rgba(34,197,94,0.1);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;
  }
  h1{
    color:#fff;font-size:24px;font-weight:700;margin-bottom:12px;
    line-height:1.3;
  }
  p{
    color:#94a3b8;font-size:15px;line-height:1.7;margin-bottom:28px;
  }
  .wa-btn{
    display:inline-flex;align-items:center;gap:10px;
    background:#22C55E;color:#052e16;
    padding:14px 28px;border-radius:10px;
    font-weight:700;font-size:15px;text-decoration:none;
    transition:transform 0.2s;
  }
  .wa-btn:hover{transform:translateY(-2px);}
  .dots{
    display:flex;gap:6px;justify-content:center;margin-top:32px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#22C55E;
    animation:pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{
    0%,100%{opacity:0.3;transform:scale(0.8);}
    50%{opacity:1;transform:scale(1.1);}
  }
</style>
</head>
<body>

</html>
